services:
  - type: web
    name: bracu-advisor-backend
    runtime: python
    repo: https://github.com/Jabir281/BURU.git
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
